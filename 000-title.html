<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>Agent Skills 導入策略與落地藍圖</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://abbeego.github.io/MyStyleSlide/common.css">
    <style>
        body {
            background-image: var(--bg-title);
        }

        .outer {
            position: absolute;
            top: 27%;
            left: 8%;
            width: 55%;
            display: grid;
            grid-template-columns: auto auto;
            column-gap: 22px;
            row-gap: 24px;
            align-items: center;
        }

        h1 {
            font-size: 75px;
            line-height: 1.3;
            margin-left: 2em;
            color: var(--accent-2);
            font-weight: bold;
            grid-column: 1 / -1;
        }

        .subtitle {
            font-size: 38px;
            font-weight: 700;
            margin-top: 1em;
            margin-bottom: 40px;
            margin-left: 4em;
            grid-column: 1;
            color: var(--primary-2);
        }

        .date-badge {
            padding: 6px 14px;
            font-size: 22px;
            color: var(--primary-1);
            margin-top: 4em;
            margin-bottom: 40px;
            grid-column: 2;
            margin-left: 10ch;
        }

        .subtitle2 {
            color: var(--accent-2);
            font-size: 30px;
            font-weight: bold;
            margin-left: 2em;
            margin-top: 5em;
        }

        .my-name {
            margin-top: 6em;
            font-size: 25px;
            color: var(--primary-2);
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="outer">
        <h1>Agent Skills<br>導入策略與落地藍圖</h1>
        <div class="subtitle">建構可治理的模組化知識資產</div>
        <div class="date-badge">2026.02</div>
        <p class="subtitle2">
            <i class="fas fa-building"></i> 專為高嚴謹度金融與企業環境設計
        </p>
        <div class="my-name">智能金融處 郭珊珊</div>
    </div>

    <!-- 導覽列 -->
    <div class="controls">
        <button class="btn" onclick="prevSlide()">←</button>
        <span class="page-num" id="pageIndicator"></span>
        <button class="btn" onclick="nextSlide()">→</button>
    </div>
    <script src="https://abbeego.github.io/MyStyleSlide/slide-order.js"></script>
    <script src="https://abbeego.github.io/MyStyleSlide/control.js"></script>
</body>

</html>
