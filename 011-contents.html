<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>目錄 CONTENTS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://abbeego.github.io/MyStyleSlide/common.css">
    <style>
        body {
            background-image: var(--bg-other);
        }

        .outer {
            position: absolute;
            top: 15%;
            bottom: 15%;
            left: 15%;
            right: 15%;
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: start;
            color: var(--primary-1);
        }

        .slide-title {
            font-size: 52px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            justify-self: center;
            align-self: start;
            text-align: center;
        }

        .slide-title span {
            font-size: 32px;
            letter-spacing: 1px;
        }

        .list {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0;
            justify-self: center;
            align-self: center;
        }

        .topic-row {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .item {
            font-size: 38px;
            font-weight: 700;
            color: var(--accent-2);
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 12px 0;
            flex: 0 0 auto;
        }

        .page {
            font-size: 38px;
            font-weight: 700;
            color: var(--accent-2);
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 12px 0;
            margin-left: auto;
            flex: 0 0 auto;
        }

        .svg-gap {
            flex: 1 1 auto;
            margin: 0 5% 0 10px;
        }

        .hr {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-1) 0%, var(--accent-1) 33%, var(--accent-3) 100%);
        }

        /* Reusable class for SVG container */
        .svg-container {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>

<body>
    <svg aria-hidden="true" focusable="false" style="position:absolute;width:0;height:0;">
        <defs>
            <linearGradient id="multi-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#008FC7;" />
                <stop offset="71.4%" style="stop-color:#30DAA2;" />
                <stop offset="76.8%" style="stop-color:#008FC7;" />
                <stop offset="100%" style="stop-color:#30DAA2;" />
            </linearGradient>
            <symbol id="topic-line" viewBox="0 0 600 60">
                <g fill="none" stroke-width="3">
                    <polyline points="20,25 420,25 450,45 580,45" stroke="url(#multi-gradient)" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <circle cx="20" cy="25" r="5" stroke="#008FC7" fill="#fff" stroke-width="3" />
                    <circle cx="580" cy="45" r="5" stroke="#30DAA2" fill="#fff" stroke-width="3" />
                </g>
            </symbol>
        </defs>
    </svg>
    <div class="outer">
        <h2 class="slide-title">目錄<span>CONTENTS</span></h2>
        <div class="list">
            <div class="topic-row">
                <div class="item">
                    1. 核心理念
                </div>
                <div class="svg-gap">
                    <svg viewBox="0 0 600 60" xmlns="http://www.w3.org/2000/svg" class="svg-container">
                        <use href="#topic-line"></use>
                    </svg>
                </div>
                <div class="page">P.4-P.9</div>
            </div>
            <div class="topic-row">
                <div class="item">
                    2. 應用場景與案例
                </div>
                <div class="svg-gap">
                    <svg viewBox="0 0 600 60" xmlns="http://www.w3.org/2000/svg" class="svg-container">
                        <use href="#topic-line"></use>
                    </svg>
                </div>
                <div class="page">P.10</div>
            </div>
            <div class="topic-row">
                <div class="item">
                    3. 治理方式
                </div>
                <div class="svg-gap">
                    <svg viewBox="0 0 600 60" xmlns="http://www.w3.org/2000/svg" class="svg-container">
                        <use href="#topic-line"></use>
                    </svg>
                </div>
                <div class="page">P.11-P.12</div>
            </div>
            <div class="topic-row">
                <div class="item">
                    4. 導入策略藍圖
                </div>
                <div class="svg-gap">
                    <svg viewBox="0 0 600 60" xmlns="http://www.w3.org/2000/svg" class="svg-container">
                        <use href="#topic-line"></use>
                    </svg>
                </div>
                <div class="page">P.13</div>
            </div>
            <div class="topic-row">
                <div class="item">
                    5. 結語
                </div>
                <div class="svg-gap">
                    <svg viewBox="0 0 600 60" xmlns="http://www.w3.org/2000/svg" class="svg-container">
                        <use href="#topic-line"></use>
                    </svg>
                </div>
                <div class="page">P.14</div>
            </div>
        </div>
    </div>
    <!-- 導覽列 -->
    <div class="controls">
        <button class="btn" onclick="prevSlide()">←</button>
        <span class="page-num" id="pageIndicator"></span>
        <button class="btn" onclick="nextSlide()">→</button>
    </div>
    <script src="https://abbeego.github.io/MyStyleSlide/slide-order.js"></script>
    <script src="https://abbeego.github.io/MyStyleSlide/control.js"></script>
</body>

</html>
