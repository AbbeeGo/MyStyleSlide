<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Skills 四大核心能力</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://abbeego.github.io/MyStyleSlide/common.css">
    <style>
        body {
            background-image: var(--bg-other);
        }

        .outer {
            position: absolute;
            top: 5%;
            bottom: 5%;
            left: 10%;
            right: 10%;
            display: flex;
            flex-direction: column;
        }

        /* 標題列 */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .slide-title {
            font-size: 52px;
            color: var(--primary-1);
            font-weight: bold;
        }

        .sub-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            font-size: 22px;
        }

        .sub-info i {
            color: var(--primary-1);
        }

        /* 主內容區：2x2 網格 + 中央圖片 */
        .four-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            grid-template-rows: 1fr auto 1fr;
            gap: 0;
            align-items: center;
            justify-items: center;
        }

        /* 中央圖片 */
        .center-image {
            grid-column: 2;
            grid-row: 2;
            width: 220px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .center-image::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #e8ecf0;
            z-index: -1;
        }

        .center-image img {
            width: 60%;
            height: 60%;
            object-fit: contain;
            border-radius: 12px;
            position: relative;
            z-index: 1;
        }

        /* 連接線 */
        .line-v {
            grid-column: 2;
            width: 3px;
            height: 80%;
            background: linear-gradient(to bottom, var(--primary-1), var(--accent-3));
            position: relative;
        }

        .line-v-top {
            grid-row: 1;
        }

        .line-v-bottom {
            grid-row: 3;
        }

        .line-v::before,
        .line-v::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 3px solid var(--primary-1);
            background: var(--bg);
        }

        .line-v::before {
            top: -5px;
        }

        .line-v::after {
            bottom: -5px;
            border-color: var(--accent-3);
        }

        .line-h {
            grid-row: 2;
            height: 3px;
            width: 80%;
            background: linear-gradient(to right, var(--primary-1), var(--accent-3));
            position: relative;
        }

        .line-h-left {
            grid-column: 1;
        }

        .line-h-right {
            grid-column: 3;
        }

        .line-h::before,
        .line-h::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 3px solid var(--primary-1);
            background: var(--bg);
        }

        .line-h::before {
            left: -5px;
        }

        .line-h::after {
            right: -5px;
            border-color: var(--accent-3);
        }

        /* 四個項目卡片 */
        .item-card {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 8px;
        }

        .item-card.top-left {
            grid-column: 1;
            grid-row: 1;
            align-self: end;
            justify-self: stretch;
            justify-content: flex-end;
            transform: translateY(55px);
            z-index: 1;
        }

        .item-card.top-right {
            grid-column: 3;
            grid-row: 1;
            align-self: end;
            justify-self: start;
            transform: translateY(55px);
            z-index: 1;
        }

        .item-card.bottom-left {
            grid-column: 1;
            grid-row: 3;
            align-self: start;
            justify-self: stretch;
            justify-content: flex-end;
            transform: translateY(-55px);
            z-index: 1;
        }

        .item-card.bottom-right {
            grid-column: 3;
            grid-row: 3;
            align-self: start;
            justify-self: start;
            transform: translateY(-55px);
            z-index: 1;
        }

        /* 圓形圖示 */
        .item-icon {
            width: 60px;
            height: 60px;
            min-width: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-1), var(--accent-2));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg);
            font-size: 30px;
        }

        .item-card .item-text {
            width: 500px;
        }

        .item-text h3 {
            color: var(--accent-2);
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .item-text p {
            font-size: 30px;
            line-height: 1.5;
            color: var(--text);
            margin: 0;
        }

        /* 中央下方標籤 */
        .center-label {
            text-align: center;
            color: var(--primary-1);
            font-size: 22px;
            font-weight: bold;
            margin-top: 5px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="outer">
        <!-- 標題列 -->
        <div class="header-row">
            <div class="slide-title">Agent Skills 四大核心能力</div>
            <div class="sub-info"><span>智慧企業轉型藍圖</span> <i class="fas fa-th"></i></div>
        </div>

        <!-- 主內容：四宮格 -->
        <div class="four-grid">
            <!-- 左上 -->
            <div class="item-card top-left">
                <div class="item-icon"><i class="fas fa-comments"></i></div>
                <div class="item-text">
                    <h3>智慧對話引擎</h3>
                    <p>自動理解使用者意圖<br>提供精準且即時的回應<br>支援多輪對話與上下文記憶<br>大幅提升客戶服務效率</p>
                </div>
            </div>

            <!-- 上方連接線 -->
            <div class="line-v line-v-top"></div>

            <!-- 右上 -->
            <div class="item-card top-right">
                <div class="item-icon"><i class="fas fa-globe"></i></div>
                <div class="item-text">
                    <h3>跨平台整合</h3>
                    <p>串接企業內部系統<br>實現資料無縫流通<br>支援 API 與微服務架構<br>一站式管理多元數據來源</p>
                </div>
            </div>

            <!-- 左側連接線 -->
            <div class="line-h line-h-left"></div>

            <!-- 中央圖片 -->
            <div class="center-image">
                <img src="href=" https://abbeego.github.io/MyStyleSlide/fb.png" />
                <span class="center-label">Agent Skills</span>
            </div>

            <!-- 右側連接線 -->
            <div class="line-h line-h-right"></div>

            <!-- 左下 -->
            <div class="item-card bottom-left">
                <div class="item-icon"><i class="fas fa-chart-bar"></i></div>
                <div class="item-text">
                    <h3>數據分析洞察</h3>
                    <p>即時追蹤 Skill 使用數據<br>量化 AI 投資回報率<br>視覺化報表一目了然<br>驅動數據導向決策流程</p>
                </div>
            </div>

            <!-- 下方連接線 -->
            <div class="line-v line-v-bottom"></div>

            <!-- 右下 -->
            <div class="item-card bottom-right">
                <div class="item-icon"><i class="fas fa-thumbs-up"></i></div>
                <div class="item-text">
                    <h3>持續優化迴圈</h3>
                    <p>根據回饋自動調校模型<br>打造越用越聰明的 AI<br>結合人類專家經驗回饋<br>持續迭代提升準確度</p>
                </div>
            </div>


        </div>
    </div>
    <!-- 導覽列 -->
    <div class="controls">
        <button class="btn" onclick="prevSlide()">←</button>
        <span class="page-num" id="pageIndicator"></span>
        <button class="btn" onclick="nextSlide()">→</button>
    </div>
    <script src="https://abbeego.github.io/MyStyleSlide/slide-order.js"></script>
    <script src="https://abbeego.github.io/MyStyleSlide/control.js"></script>
</body>

</html>
