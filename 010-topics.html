<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>Topics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://abbeego.github.io/MyStyleSlide/common.css">
    <style>
        body {
            background-image: var(--bg-other);
        }

        .outer {
            position: absolute;
            top: 10%;
            bottom: 10%;
            left: 20%;
            right: 20%;
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: start;
            color: var(--primary-1);
        }

        .slide-title {
            font-size: 52px;
            margin-bottom: 40px;
            padding: 30px;
            border-bottom: none;
            background-image: linear-gradient(90deg, var(--primary-1) 0%, var(--accent-3) 100%);
            background-size: 100% 4px;
            background-position: left bottom;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            gap: 15px;
            justify-self: start;
            align-self: start;
        }

        .list {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0;
            justify-self: center;
            align-self: center;
        }

        .item {
            font-size: 38px;
            font-weight: 700;
            color: var(--accent-2);
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 28px;
        }

        .hr {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-1) 0%, var(--accent-1) 33%, var(--accent-3) 100%);
        }
    </style>
</head>

<body>
    <div class="outer">
        <h2 class="slide-title"><i class="fas fa-list"></i> Topics</h2>
        <div class="list">
            <div class="item">
                核心理念：為什麼需要 Agent Skills？
            </div>
            <div class="hr"></div>
            <div class="item">
                應用場景與案例
            </div>
            <div class="hr"></div>
            <div class="item">
                治理方式：怎麼放心用？
            </div>
            <div class="hr"></div>
            <div class="item">
                導入策略藍圖
            </div>
            <div class="hr"></div>
            <div class="item">
                結語
            </div>
        </div>
    </div>

    <!-- 導覽列 -->
    <div class="controls">
        <button class="btn" onclick="prevSlide()">←</button>
        <span class="page-num" id="pageIndicator"></span>
        <button class="btn" onclick="nextSlide()">→</button>
    </div>
    <script src="https://abbeego.github.io/MyStyleSlide/slide-order.js"></script>
    <script src="https://abbeego.github.io/MyStyleSlide/control.js"></script>
</body>

</html>
