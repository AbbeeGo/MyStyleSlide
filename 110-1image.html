<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畫面展示</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://abbeego.github.io/MyStyleSlide/common.css">
    <style>
        body {
            background-image: var(--bg-other);
        }

        .outer {
            position: absolute;
            top: 2%;
            bottom: 5%;
            left: 3%;
            right: 3%;
            display: flex;
            flex-direction: column;
        }

        /* 標題列 */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-left: 120px;
            padding-right: 100px;
        }

        .slide-title {
            font-size: 52px;
            color: var(--primary-1);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sub-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            font-size: 22px;
        }

        .sub-info i {
            color: var(--primary-1);
        }

        /* 圖片容器 */
        .image-wrap {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-wrap img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 79, 116, 0.10);
            transition: all 0.3s ease;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="outer">
        <!-- 標題列 -->
        <div class="header-row">
            <div class="slide-title"><i class="fas fa-image"></i> 畫面展示</div>
            <div class="sub-info"><span>Screenshot</span> <i class="fas fa-desktop"></i></div>
        </div>

        <!-- 圖片區域 -->
        <div class="image-wrap">
            <img src="https://abbeego.github.io/MyStyleSlide/bg_thanks.jpg" alt="畫面展示"
                onclick="window.open(this.src, '_blank')">
        </div>
    </div>
    <!-- 導覽列 -->
    <div class="controls">
        <button class="btn" onclick="prevSlide()">←</button>
        <span class="page-num" id="pageIndicator"></span>
        <button class="btn" onclick="nextSlide()">→</button>
    </div>
    <script src="https://abbeego.github.io/MyStyleSlide/slide-order.js"></script>
    <script src="https://abbeego.github.io/MyStyleSlide/control.js"></script>
</body>

</html>
