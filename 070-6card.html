<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業數位轉型六大關鍵</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://abbeego.github.io/MyStyleSlide/common.css">
    <style>
        body {
            background-image: var(--bg-other);
        }

        .outer {
            position: absolute;
            top: 12%;
            bottom: 12%;
            left: 12%;
            right: 12%;
            display: flex;
            flex-direction: column;
        }

        /* 標題列 */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .slide-title {
            font-size: 52px;
            color: var(--primary-1);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
        }

        .sub-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            font-size: 22px;
        }

        .sub-info i {
            color: var(--primary-1);
        }

        /* 六宮格 3x2 */
        .six-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 1fr 1fr;
            gap: 28px;
        }

        /* 卡片 */
        .tile-card {
            background: var(--bg);
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 79, 116, 0.10);
            border: 1px solid var(--border);
            padding: 28px 24px 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .tile-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 40px rgba(0, 79, 116, 0.18);
        }

        /* 頂部裝飾條 */
        .tile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
        }

        .tile-card:nth-child(1)::before {
            background: linear-gradient(90deg, var(--primary-1), var(--accent-1));
        }

        .tile-card:nth-child(2)::before {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-3));
        }

        .tile-card:nth-child(3)::before {
            background: linear-gradient(90deg, var(--accent-3), var(--primary-2));
        }

        .tile-card:nth-child(4)::before {
            background: linear-gradient(90deg, var(--support-1), var(--support-3));
        }

        .tile-card:nth-child(5)::before {
            background: linear-gradient(90deg, var(--support-3), var(--support-5));
        }

        .tile-card:nth-child(6)::before {
            background: linear-gradient(90deg, var(--support-5), var(--accent-2));
        }

        /* SVG 圖示容器 */
        .tile-icon {
            width: 72px;
            height: 72px;
            margin-bottom: 14px;
        }

        /* 卡片標題 */
        .tile-card h3 {
            color: var(--accent-2);
            font-size: 35px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tile-card h3 .num-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            color: var(--bg);
            flex-shrink: 0;
        }

        .tile-card:nth-child(1) .num-badge {
            background: var(--primary-1);
        }

        .tile-card:nth-child(2) .num-badge {
            background: var(--accent-1);
        }

        .tile-card:nth-child(3) .num-badge {
            background: var(--primary-2);
        }

        .tile-card:nth-child(4) .num-badge {
            background: var(--support-1);
        }

        .tile-card:nth-child(5) .num-badge {
            background: var(--support-3);
        }

        .tile-card:nth-child(6) .num-badge {
            background: var(--support-5);
        }

        /* 卡片文字 */
        .tile-card p {
            font-size: 24px;
            line-height: 1.6;
            color: var(--text);
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="outer">
        <!-- 標題列 -->
        <div class="header-row">
            <div class="slide-title"><i class="fas fa-cubes"></i> 企業數位轉型六大關鍵</div>
            <div class="sub-info"><span>Digital Transformation</span> <i class="fas fa-rocket"></i></div>
        </div>
        <!-- 六宮格 -->
        <div class="six-grid">
            <!-- 1. 策略願景 -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="40" cy="40" r="36" fill="none" stroke="var(--primary-1)" stroke-width="2.5"
                        opacity="0.15" />
                    <circle cx="40" cy="40" r="26" fill="none" stroke="var(--primary-1)" stroke-width="2"
                        opacity="0.3" />
                    <circle cx="40" cy="40" r="15" fill="var(--primary-1)" opacity="0.12" />
                    <path d="M40 18 L44 32 H56 L46 40 L50 54 L40 46 L30 54 L34 40 L24 32 H36Z"
                        fill="var(--primary-1)" />
                </svg>
                <h3><span class="num-badge">1</span>策略願景</h3>
                <p>制定明確數位轉型藍圖<br>對齊企業長期經營目標<br>確立階段性里程碑</p>
            </div>

            <!-- 2. 數據驅動 -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <rect x="10" y="50" width="10" height="20" rx="2" fill="var(--accent-1)" opacity="0.6" />
                    <rect x="24" y="38" width="10" height="32" rx="2" fill="var(--accent-1)" opacity="0.75" />
                    <rect x="38" y="28" width="10" height="42" rx="2" fill="var(--accent-1)" opacity="0.9" />
                    <rect x="52" y="18" width="10" height="52" rx="2" fill="var(--accent-1)" />
                    <polyline points="14,46 28,34 42,24 58,14" fill="none" stroke="var(--accent-2)" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="58" cy="14" r="4" fill="var(--accent-2)" />
                </svg>
                <h3><span class="num-badge">2</span>數據驅動</h3>
                <p>建構企業級數據平台<br>從數據洞察驅動決策<br>實現精準營運分析</p>
            </div>

            <!-- 3. 流程再造 -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="18" cy="40" r="10" fill="none" stroke="var(--primary-2)" stroke-width="2.5" />
                    <circle cx="18" cy="40" r="4" fill="var(--primary-2)" />
                    <line x1="28" y1="40" x2="44" y2="40" stroke="var(--primary-2)" stroke-width="2.5"
                        stroke-linecap="round" />
                    <polygon points="44,34 56,40 44,46" fill="var(--primary-2)" />
                    <rect x="54" y="28" width="20" height="24" rx="5" fill="none" stroke="var(--primary-2)"
                        stroke-width="2.5" />
                    <path d="M60 36 L63 40 L70 33" fill="none" stroke="var(--accent-3)" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <h3><span class="num-badge">3</span>流程再造</h3>
                <p>全面檢視現有作業流程<br>導入自動化與智慧化<br>減少人工錯誤與延遲</p>
            </div>

            <!-- 4. 人才培育 -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="40" cy="24" r="12" fill="var(--support-1)" opacity="0.3" />
                    <circle cx="40" cy="24" r="8" fill="var(--support-1)" />
                    <path d="M20 62 Q20 44 40 44 Q60 44 60 62" fill="var(--support-1)" opacity="0.5" />
                    <circle cx="22" cy="30" r="6" fill="var(--support-3)" opacity="0.5" />
                    <circle cx="58" cy="30" r="6" fill="var(--support-3)" opacity="0.5" />
                    <path d="M38 18 L40 12 L42 18" fill="none" stroke="var(--accent-2)" stroke-width="2"
                        stroke-linecap="round" />
                    <line x1="40" y1="12" x2="40" y2="8" stroke="var(--accent-2)" stroke-width="2"
                        stroke-linecap="round" />
                </svg>
                <h3><span class="num-badge">4</span>人才培育</h3>
                <p>強化員工數位技能<br>建立跨領域學習文化<br>培養內部創新動能</p>
            </div>

            <!-- 5. 技術架構 -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <rect x="22" y="16" width="36" height="28" rx="4" fill="none" stroke="var(--support-3)"
                        stroke-width="2.5" />
                    <line x1="40" y1="44" x2="40" y2="52" stroke="var(--support-3)" stroke-width="2.5" />
                    <line x1="28" y1="52" x2="52" y2="52" stroke="var(--support-3)" stroke-width="2.5"
                        stroke-linecap="round" />
                    <circle cx="40" cy="58" r="3" fill="var(--support-5)" opacity="0.5" />
                    <line x1="40" y1="61" x2="40" y2="68" stroke="var(--support-5)" stroke-width="2"
                        stroke-dasharray="3,2" />
                    <circle cx="28" cy="68" r="5" fill="var(--support-5)" opacity="0.4" />
                    <circle cx="40" cy="68" r="5" fill="var(--support-5)" opacity="0.6" />
                    <circle cx="52" cy="68" r="5" fill="var(--support-5)" opacity="0.8" />
                    <line x1="28" y1="68" x2="52" y2="68" stroke="var(--support-5)" stroke-width="1.5" />
                    <text x="40" y="34" text-anchor="middle" fill="var(--support-3)" font-size="14"
                        font-weight="bold">&lt;/&gt;</text>
                </svg>
                <h3><span class="num-badge">5</span>技術架構</h3>
                <p>採用雲原生彈性架構<br>確保系統可擴展性<br>強化資安與合規治理</p>
            </div>

            <!-- 6. 持續迭代 -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <path d="M40 16 A24 24 0 1 1 16 40" fill="none" stroke="var(--support-5)" stroke-width="2.5"
                        stroke-linecap="round" />
                    <polygon points="16,32 16,48 8,40" fill="var(--support-5)" />
                    <path d="M40 64 A24 24 0 0 1 16 40" fill="none" stroke="var(--accent-2)" stroke-width="2.5"
                        stroke-linecap="round" stroke-dasharray="4,3" />
                    <circle cx="40" cy="40" r="12" fill="var(--support-5)" opacity="0.12" />
                    <path d="M35 38 L40 44 L48 34" fill="none" stroke="var(--accent-2)" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <h3><span class="num-badge">6</span>持續迭代</h3>
                <p>建立敏捷回饋機制<br>以 MVP 快速驗證價值<br>持續學習與優化提升</p>
            </div>
        </div>
    </div>
    <!-- 導覽列 -->
    <div class="controls">
        <button class="btn" onclick="prevSlide()">←</button>
        <span class="page-num" id="pageIndicator"></span>
        <button class="btn" onclick="nextSlide()">→</button>
    </div>
    <script src="https://abbeego.github.io/MyStyleSlide/slide-order.js"></script>
    <script src="https://abbeego.github.io/MyStyleSlide/control.js"></script>
</body>

</html>
