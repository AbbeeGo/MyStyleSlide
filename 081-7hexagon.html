<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 導入成功七要素</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://abbeego.github.io/MyStyleSlide/common.css">
    <style>
        body {
            background-image: var(--bg-other);
        }

        .outer {
            position: absolute;
            top: 10%;
            bottom: 5%;
            left: 15%;
            right: 15%;
            display: flex;
            flex-direction: column;
        }

        /* 標題列 */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .slide-title {
            font-size: 52px;
            color: var(--primary-1);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sub-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            font-size: 22px;
        }

        .sub-info i {
            color: var(--primary-1);
        }

        /* 蜂巢容器 */
        .honeycomb {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            position: relative;
        }

        .hex-row {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .hex-row.row-mid,
        .hex-row.row-bottom {
            margin-top: -58px;
        }

        /* 六角形卡片 */
        .hex-card {
            width: 240px;
            height: 264px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            justify-content: flex-start;
            text-align: center;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: var(--bg);
            cursor: default;
        }

        .hex-wrap {
            transition: transform 0.3s, filter 0.3s;
        }

        .hex-wrap:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 6px 18px rgba(0, 79, 116, 0.25));
        }

        /* 六角形外框效果：用一個稍大的六角形做背景 */
        .hex-wrap {
            position: relative;
        }

        .hex-wrap::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            width: 246px;
            height: 270px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            z-index: -1;
        }

        /* 各六角形邊框顏色 */
        .hex-wrap:nth-child(1)::before {
            background: linear-gradient(135deg, var(--primary-1), var(--accent-1));
        }

        .hex-wrap:nth-child(2)::before {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
        }

        .hex-wrap:nth-child(3)::before {
            background: linear-gradient(135deg, var(--primary-2), var(--accent-3));
        }

        .hex-wrap:nth-child(4)::before {
            background: linear-gradient(135deg, var(--support-1), var(--support-3));
        }

        .hex-wrap:nth-child(5)::before {
            background: linear-gradient(135deg, var(--support-3), var(--support-5));
        }

        .hex-row.row-mid .hex-wrap:nth-child(1)::before {
            background: linear-gradient(135deg, var(--accent-3), var(--primary-2));
        }

        .hex-row.row-mid .hex-wrap:nth-child(2)::before {
            background: linear-gradient(135deg, var(--primary-1), var(--primary-2));
        }

        .hex-row.row-mid .hex-wrap:nth-child(3)::before {
            background: linear-gradient(135deg, var(--support-1), var(--support-3));
        }

        .hex-row.row-bottom .hex-wrap:nth-child(1)::before {
            background: linear-gradient(135deg, var(--support-3), var(--support-5));
        }

        .hex-row.row-bottom .hex-wrap:nth-child(2)::before {
            background: linear-gradient(135deg, var(--support-5), var(--accent-2));
        }

        /* 中央核心六角形特殊樣式 */
        .hex-card.center-hex {
            background: linear-gradient(135deg, var(--primary-1), var(--primary-2));
        }

        .hex-card.center-hex .hex-title {
            color: var(--bg);
        }

        .hex-card.center-hex .hex-desc {
            color: rgba(255, 255, 255, 0.9);
        }

        .hex-card.center-hex .hex-icon-svg {
            opacity: 0.9;
        }

        /* SVG 圖示 */
        .hex-icon-svg {
            width: 52px;
            height: 52px;
        }

        /* 標題 */
        .hex-title {
            font-size: 34px;
            font-weight: bold;
            color: var(--accent-2);
            margin-bottom: 4px;
        }

        /* 描述 */
        .hex-desc {
            font-size: 22px;
            line-height: 1.5;
            color: var(--text);
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="outer">
        <!-- 標題列 -->
        <div class="header-row">
            <div class="slide-title"><i class="fas fa-brain"></i> AI 導入成功七要素</div>
            <div class="sub-info"><span>AI Adoption Framework</span> <i class="fas fa-network-wired"></i></div>
        </div>

        <!-- 蜂巢佈局 -->
        <div class="honeycomb">
            <!-- 上排：2 個 -->
            <div class="hex-row row-top">
                <div class="hex-wrap">
                    <div class="hex-card">
                        <svg class="hex-icon-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="40" cy="26" r="10" fill="var(--primary-1)" opacity="0.3" />
                            <circle cx="40" cy="26" r="6" fill="var(--primary-1)" />
                            <path d="M26 56 Q26 42 40 42 Q54 42 54 56" fill="var(--primary-1)" opacity="0.5" />
                            <path d="M36 20 L40 12 L44 20" fill="none" stroke="var(--accent-1)" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <line x1="40" y1="12" x2="40" y2="6" stroke="var(--accent-1)" stroke-width="2.5"
                                stroke-linecap="round" />
                            <circle cx="34" cy="8" r="2" fill="var(--accent-1)" opacity="0.6" />
                            <circle cx="46" cy="8" r="2" fill="var(--accent-1)" opacity="0.6" />
                        </svg>
                        <div class="hex-title">領導承諾</div>
                        <p class="hex-desc">高層親自推動<br>確立轉型決心</p>
                    </div>
                </div>
                <div class="hex-wrap">
                    <div class="hex-card">
                        <svg class="hex-icon-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                            <ellipse cx="40" cy="22" rx="22" ry="8" fill="none" stroke="var(--accent-1)"
                                stroke-width="2.5" />
                            <ellipse cx="40" cy="22" rx="22" ry="8" fill="var(--accent-1)" opacity="0.15" />
                            <path d="M18 22 v16 a22 8 0 0 0 44 0 v-16" fill="none" stroke="var(--accent-1)"
                                stroke-width="2.5" />
                            <ellipse cx="40" cy="38" rx="22" ry="8" fill="none" stroke="var(--accent-1)"
                                stroke-width="1.5" stroke-dasharray="3,3" />
                            <path d="M18 38 v16 a22 8 0 0 0 44 0 v-16" fill="none" stroke="var(--accent-1)"
                                stroke-width="2.5" />
                            <ellipse cx="40" cy="54" rx="22" ry="8" fill="var(--accent-1)" opacity="0.1" />
                        </svg>
                        <div class="hex-title">數據治理</div>
                        <p class="hex-desc">建立數據標準<br>確保品質與安全</p>
                    </div>
                </div>
            </div>

            <!-- 中排：3 個（含中央核心） -->
            <div class="hex-row row-mid">
                <div class="hex-wrap">
                    <div class="hex-card">
                        <svg class="hex-icon-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="28" cy="28" r="9" fill="var(--primary-2)" opacity="0.3" />
                            <circle cx="28" cy="28" r="5" fill="var(--primary-2)" />
                            <circle cx="52" cy="28" r="9" fill="var(--accent-3)" opacity="0.3" />
                            <circle cx="52" cy="28" r="5" fill="var(--accent-3)" />
                            <path d="M20 58 Q20 46 32 46 H48 Q60 46 60 58" fill="var(--primary-2)" opacity="0.35" />
                            <path d="M32 38 L40 44 L48 38" fill="none" stroke="var(--accent-3)" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <div class="hex-title">人才養成</div>
                        <p class="hex-desc">培養 AI 素養<br>跨域團隊協作</p>
                    </div>
                </div>
                <div class="hex-wrap">
                    <div class="hex-card center-hex">
                        <svg class="hex-icon-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="40" cy="40" r="28" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)"
                                stroke-width="2" />
                            <circle cx="40" cy="40" r="18" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)"
                                stroke-width="1.5" />
                            <path d="M40 22 L40 34 M40 46 L40 58 M22 40 L34 40 M46 40 L58 40"
                                stroke="rgba(255,255,255,0.8)" stroke-width="2.5" stroke-linecap="round" />
                            <circle cx="40" cy="40" r="6" fill="rgba(255,255,255,0.9)" />
                            <path d="M28 28 L34 34 M46 34 L52 28 M28 52 L34 46 M46 46 L52 52"
                                stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" />
                        </svg>
                        <div class="hex-title">文化變革</div>
                        <p class="hex-desc">組織思維轉型<br>擁抱創新文化</p>
                    </div>
                </div>
                <div class="hex-wrap">
                    <div class="hex-card">
                        <svg class="hex-icon-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                            <rect x="16" y="20" width="48" height="32" rx="4" fill="none" stroke="var(--support-1)"
                                stroke-width="2.5" />
                            <line x1="40" y1="52" x2="40" y2="60" stroke="var(--support-1)" stroke-width="2.5" />
                            <line x1="28" y1="60" x2="52" y2="60" stroke="var(--support-1)" stroke-width="2.5"
                                stroke-linecap="round" />
                            <circle cx="32" cy="36" r="4" fill="var(--support-1)" opacity="0.5" />
                            <circle cx="48" cy="36" r="4" fill="var(--support-1)" opacity="0.5" />
                            <line x1="32" y1="36" x2="48" y2="36" stroke="var(--support-1)" stroke-width="1.5"
                                stroke-dasharray="3,2" />
                            <path d="M36 30 L40 26 L44 30" fill="none" stroke="var(--support-3)" stroke-width="2"
                                stroke-linecap="round" />
                        </svg>
                        <div class="hex-title">技術基建</div>
                        <p class="hex-desc">打造穩健平台<br>支撐 AI 運算力</p>
                    </div>
                </div>
            </div>

            <!-- 下排：2 個 -->
            <div class="hex-row row-bottom">
                <div class="hex-wrap">
                    <div class="hex-card">
                        <svg class="hex-icon-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="40" cy="40" r="24" fill="none" stroke="var(--support-3)" stroke-width="2.5" />
                            <path d="M40 16 L40 40 L56 52" fill="none" stroke="var(--support-3)" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <circle cx="40" cy="40" r="4" fill="var(--support-3)" />
                            <path d="M26 58 Q40 68 54 58" fill="none" stroke="var(--support-5)" stroke-width="2"
                                stroke-linecap="round" stroke-dasharray="4,3" />
                            <path d="M30 22 L34 18 L34 26" fill="none" stroke="var(--support-5)" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <div class="hex-title">場景落地</div>
                        <p class="hex-desc">選定高價值場景<br>快速驗證成效</p>
                    </div>
                </div>
                <div class="hex-wrap">
                    <div class="hex-card">
                        <svg class="hex-icon-svg" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 56 L20 24 Q20 16 28 16 L52 16 Q60 16 60 24 L60 56" fill="none"
                                stroke="var(--support-5)" stroke-width="2.5" stroke-linecap="round" />
                            <line x1="16" y1="56" x2="64" y2="56" stroke="var(--support-5)" stroke-width="2.5"
                                stroke-linecap="round" />
                            <path d="M32 30 L38 38 L50 24" fill="none" stroke="var(--accent-2)" stroke-width="3"
                                stroke-linecap="round" stroke-linejoin="round" />
                            <line x1="30" y1="46" x2="50" y2="46" stroke="var(--support-5)" stroke-width="1.5"
                                stroke-dasharray="4,3" />
                        </svg>
                        <div class="hex-title">風險管控</div>
                        <p class="hex-desc">合規與倫理審查<br>建立安全護欄</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- 導覽列 -->
    <div class="controls">
        <button class="btn" onclick="prevSlide()">←</button>
        <span class="page-num" id="pageIndicator"></span>
        <button class="btn" onclick="nextSlide()">→</button>
    </div>
    <script src="https://abbeego.github.io/MyStyleSlide/slide-order.js"></script>
    <script src="https://abbeego.github.io/MyStyleSlide/control.js"></script>
</body>

</html>
