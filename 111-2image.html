<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畫面展示</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://abbeego.github.io/MyStyleSlide/common.css">
    <style>
        body {
            background-image: var(--bg-other);
        }

        .outer {
            position: absolute;
            top: 2%;
            bottom: 5%;
            left: 3%;
            right: 3%;
            display: flex;
            flex-direction: column;
        }

        /* 標題列 */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-left: 120px;
            padding-right: 100px;
        }

        .slide-title {
            font-size: 52px;
            color: var(--primary-1);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sub-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            font-size: 22px;
        }

        .sub-info i {
            color: var(--primary-1);
        }

        /* 雙圖片容器 */
        .image-wrap-2 {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            /* 兩張圖片的間距 */
        }

        .image-box {
            flex: 1;
            min-width: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            /* 確保容器撐滿高度，讓內部 img 可以算 max-height */
        }

        .image-wrap-2 img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 79, 116, 0.10);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .image-wrap-2 img:hover {
            transform: translateY(-5px);
            /* 微幅上浮效果，因為兩張圖點擊才會放大，這裡不做誇張放大免得遮擋 */
            box-shadow: 0 15px 40px rgba(0, 79, 116, 0.20);
        }
    </style>
</head>

<body>
    <div class="outer">
        <!-- 標題列 -->
        <div class="header-row">
            <div class="slide-title"><i class="fas fa-images"></i> 畫面展示</div>
            <div class="sub-info"><span>Screenshots</span> <i class="fas fa-desktop"></i></div>
        </div>

        <!-- 圖片區域 -->
        <div class="image-wrap-2">
            <div class="image-box">
                <img src="https://abbeego.github.io/MyStyleSlide/bg_thanks.jpg" alt="畫面展示 1"
                    onclick="window.open(this.src, '_blank')">
            </div>
            <div class="image-box">
                <img src="https://abbeego.github.io/MyStyleSlide/bg_other.jpg" alt="畫面展示 2"
                    onclick="window.open(this.src, '_blank')">
            </div>
        </div>
    </div>
    <!-- 導覽列 -->
    <div class="controls">
        <button class="btn" onclick="prevSlide()">←</button>
        <span class="page-num" id="pageIndicator"></span>
        <button class="btn" onclick="nextSlide()">→</button>
    </div>
    <script src="https://abbeego.github.io/MyStyleSlide/slide-order.js"></script>
    <script src="https://abbeego.github.io/MyStyleSlide/control.js"></script>
</body>

</html>
