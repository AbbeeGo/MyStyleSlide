<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧金融五大服務</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://abbeego.github.io/MyStyleSlide/common.css">
    <style>
        body {
            background-image: var(--bg-other);
        }

        .outer {
            position: absolute;
            top: 15%;
            bottom: 15%;
            left: 8%;
            right: 8%;
            display: flex;
            flex-direction: column;
        }

        /* 標題區 */
        .slide-title {
            font-size: 52px;
            color: var(--primary-1);
            font-weight: bold;
            padding-bottom: 40px;
            background-image: linear-gradient(90deg, var(--primary-1) 0%, var(--accent-3) 50%, var(--bg) 100%);
            background-size: 100% 4px;
            background-position: left bottom;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .slide-title i {
            color: var(--support-1);
        }

        /* 五欄並列容器 */
        .five-columns {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            align-items: start;
            align-content: center;
        }

        /* 每個項目卡片 */
        .col-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 18px;
        }

        /* SVG 圖示容器 */
        .icon-wrap {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        /* 各項目圓形背景色 — 使用 root 主色/輔色 */
        .col-item:nth-child(1) .icon-wrap {
            background: rgba(0, 143, 199, 0.12);
        }

        .col-item:nth-child(2) .icon-wrap {
            background: rgba(0, 165, 155, 0.12);
        }

        .col-item:nth-child(3) .icon-wrap {
            background: rgba(0, 212, 240, 0.12);
        }

        .col-item:nth-child(4) .icon-wrap {
            background: rgba(48, 218, 162, 0.12);
        }

        .col-item:nth-child(5) .icon-wrap {
            background: rgba(255, 201, 79, 0.12);
        }

        .icon-wrap svg {
            width: 64px;
            height: 64px;
        }

        /* 項目標題 */
        .col-item h3 {
            font-size: 32px;
            font-weight: bold;
            margin: 0;
        }

        /* 各項目標題色 — 對應 root 色彩 */
        .col-item:nth-child(1) h3 {
            color: var(--primary-1);
        }

        /* 主色 #008FC7 */
        .col-item:nth-child(2) h3 {
            color: var(--primary-2);
        }

        /* 主色 #00A59B */
        .col-item:nth-child(3) h3 {
            color: var(--accent-2);
        }

        /* 一級輔色 #004F74 */
        .col-item:nth-child(4) h3 {
            color: var(--accent-3);
        }

        /* 一級輔色 #30DAA2 */
        .col-item:nth-child(5) h3 {
            color: var(--support-4);
        }

        /* 二級輔色 #E03E57 */

        /* 分隔線 */
        .col-item hr {
            width: 50px;
            border: none;
            height: 3px;
            border-radius: 2px;
            margin: 2px auto;
        }

        .col-item:nth-child(1) hr {
            background: var(--primary-1);
        }

        .col-item:nth-child(2) hr {
            background: var(--primary-2);
        }

        .col-item:nth-child(3) hr {
            background: var(--accent-2);
        }

        .col-item:nth-child(4) hr {
            background: var(--accent-3);
        }

        .col-item:nth-child(5) hr {
            background: var(--support-4);
        }

        /* 說明文字 */
        .col-item p {
            font-size: 28px;
            line-height: 1.7;
            color: var(--text);
            margin: 0;
            text-align: left;
            padding: 0 4px;
        }
    </style>
</head>

<body>
    <div class="outer">
        <h2 class="slide-title"><i class="fas fa-building-columns"></i> 智慧金融五大服務</h2>

        <div class="five-columns">
            <!-- 1. 智能客服 — primary-1 (#008FC7) -->
            <div class="col-item">
                <div class="icon-wrap">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <rect x="12" y="18" width="40" height="30" rx="6" fill="none" stroke="var(--primary-1)"
                            stroke-width="2.5" />
                        <circle cx="26" cy="30" r="3" fill="var(--primary-1)" />
                        <circle cx="38" cy="30" r="3" fill="var(--primary-1)" />
                        <path d="M24 38 Q32 44 40 38" fill="none" stroke="var(--primary-1)" stroke-width="2"
                            stroke-linecap="round" />
                        <path d="M18 48 L18 54" stroke="var(--primary-1)" stroke-width="2.5" stroke-linecap="round" />
                        <path d="M46 48 L46 54" stroke="var(--primary-1)" stroke-width="2.5" stroke-linecap="round" />
                        <rect x="14" y="54" width="8" height="3" rx="1.5" fill="var(--primary-1)" />
                        <rect x="42" y="54" width="8" height="3" rx="1.5" fill="var(--primary-1)" />
                        <circle cx="52" cy="16" r="3" fill="var(--accent-1)" opacity="0.7" />
                        <circle cx="12" cy="14" r="2" fill="var(--accent-3)" opacity="0.5" />
                    </svg>
                </div>
                <h3>智能客服</h3>
                <hr>
                <p>AI 驅動的全天候客服<br>自動理解客戶意圖<br>即時回應常見問題<br>大幅降低人力成本</p>
            </div>

            <!-- 2. 風險管控 — primary-2 (#00A59B) -->
            <div class="col-item">
                <div class="icon-wrap">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <path d="M32 8 L52 18 V34 C52 46 32 56 32 56 C32 56 12 46 12 34 V18 Z" fill="none"
                            stroke="var(--primary-2)" stroke-width="2.5" stroke-linejoin="round" />
                        <polyline points="22,32 29,40 42,24" fill="none" stroke="var(--primary-2)" stroke-width="3"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <circle cx="50" cy="10" r="2.5" fill="var(--accent-1)" opacity="0.6" />
                        <circle cx="14" cy="12" r="2" fill="var(--support-1)" opacity="0.5" />
                    </svg>
                </div>
                <h3>風險管控</h3>
                <hr>
                <p>即時偵測異常交易<br>智慧化反洗錢分析<br>信用評估自動化<br>全面守護資產安全</p>
            </div>

            <!-- 3. 精準行銷 — accent-2 (#004F74) -->
            <div class="col-item">
                <div class="icon-wrap">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="32" cy="32" r="22" fill="none" stroke="var(--accent-2)" stroke-width="2.5" />
                        <circle cx="32" cy="32" r="14" fill="none" stroke="var(--accent-2)" stroke-width="2" />
                        <circle cx="32" cy="32" r="6" fill="var(--accent-2)" opacity="0.3" />
                        <circle cx="32" cy="32" r="3" fill="var(--accent-2)" />
                        <line x1="32" y1="6" x2="32" y2="10" stroke="var(--accent-2)" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="32" y1="54" x2="32" y2="58" stroke="var(--accent-2)" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="6" y1="32" x2="10" y2="32" stroke="var(--accent-2)" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="54" y1="32" x2="58" y2="32" stroke="var(--accent-2)" stroke-width="2"
                            stroke-linecap="round" />
                        <path d="M48 16 L42 22" stroke="var(--support-4)" stroke-width="2" stroke-linecap="round" />
                        <polygon points="48,10 54,16 48,16" fill="var(--support-4)" />
                    </svg>
                </div>
                <h3>精準行銷</h3>
                <hr>
                <p>客群標籤智慧分類<br>個人化產品推薦<br>行銷活動自動投放<br>提升轉換率與營收</p>
            </div>

            <!-- 4. 流程自動化 — accent-3 (#30DAA2) -->
            <div class="col-item">
                <div class="icon-wrap">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <rect x="10" y="10" width="18" height="14" rx="3" fill="none" stroke="var(--accent-3)"
                            stroke-width="2.5" />
                        <rect x="36" y="10" width="18" height="14" rx="3" fill="none" stroke="var(--accent-3)"
                            stroke-width="2.5" />
                        <rect x="10" y="40" width="18" height="14" rx="3" fill="none" stroke="var(--accent-3)"
                            stroke-width="2.5" />
                        <rect x="36" y="40" width="18" height="14" rx="3" fill="none" stroke="var(--accent-3)"
                            stroke-width="2.5" />
                        <path d="M28 17 L36 17" stroke="var(--accent-3)" stroke-width="2" stroke-linecap="round"
                            marker-end="none" />
                        <path d="M19 24 L19 40" stroke="var(--accent-3)" stroke-width="2" stroke-linecap="round"
                            stroke-dasharray="4 3" />
                        <path d="M45 24 L45 40" stroke="var(--accent-3)" stroke-width="2" stroke-linecap="round"
                            stroke-dasharray="4 3" />
                        <path d="M28 47 L36 47" stroke="var(--accent-3)" stroke-width="2" stroke-linecap="round" />
                        <circle cx="32" cy="32" r="6" fill="var(--accent-3)" opacity="0.15" />
                        <polyline points="29,32 31,34.5 35,29.5" fill="none" stroke="var(--accent-3)" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <h3>流程自動化</h3>
                <hr>
                <p>表單審批智慧處理<br>跨系統資料同步<br>減少人工作業錯誤<br>加速業務流程效率</p>
            </div>

            <!-- 5. 數據洞察 — support-4 (#E03E57) -->
            <div class="col-item">
                <div class="icon-wrap">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <rect x="10" y="38" width="8" height="16" rx="2" fill="var(--support-4)" opacity="0.4" />
                        <rect x="21" y="28" width="8" height="26" rx="2" fill="var(--support-4)" opacity="0.6" />
                        <rect x="32" y="20" width="8" height="34" rx="2" fill="var(--support-4)" opacity="0.8" />
                        <rect x="43" y="12" width="8" height="42" rx="2" fill="var(--support-4)" />
                        <polyline points="12,36 24,26 35,18 47,10" fill="none" stroke="var(--support-1)"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                        <circle cx="12" cy="36" r="3" fill="var(--support-1)" />
                        <circle cx="24" cy="26" r="3" fill="var(--support-1)" />
                        <circle cx="35" cy="18" r="3" fill="var(--support-1)" />
                        <circle cx="47" cy="10" r="3" fill="var(--support-1)" />
                    </svg>
                </div>
                <h3>數據洞察</h3>
                <hr>
                <p>多維度數據視覺化<br>即時監測營運指標<br>預測模型輔助決策<br>驅動數據導向經營</p>
            </div>
        </div>
    </div>

    <!-- 導覽列 -->
    <div class="controls">
        <button class="btn" onclick="prevSlide()">←</button>
        <span class="page-num" id="pageIndicator"></span>
        <button class="btn" onclick="nextSlide()">→</button>
    </div>
    <script src="https://abbeego.github.io/MyStyleSlide/slide-order.js"></script>
    <script src="https://abbeego.github.io/MyStyleSlide/control.js"></script>
</body>

</html>
