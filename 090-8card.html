<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金融科技八大趨勢</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://abbeego.github.io/MyStyleSlide/common.css">
    <style>
        body {
            background-image: var(--bg-other);
        }

        .outer {
            position: absolute;
            top: 12%;
            bottom: 12%;
            left: 10%;
            right: 10%;
            display: flex;
            flex-direction: column;
        }

        /* 標題列 */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .slide-title {
            font-size: 52px;
            color: var(--primary-1);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
        }

        .sub-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            font-size: 22px;
        }

        .sub-info i {
            color: var(--primary-1);
        }

        /* 八宮格 4x2 */
        .eight-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: 1fr 1fr;
            gap: 22px;
        }

        /* 卡片 */
        .tile-card {
            background: var(--bg);
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 79, 116, 0.10);
            border: 1px solid var(--border);
            padding: 22px 18px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .tile-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 40px rgba(0, 79, 116, 0.18);
        }

        /* 頂部裝飾條 */
        .tile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
        }

        .tile-card:nth-child(1)::before {
            background: linear-gradient(90deg, var(--primary-1), var(--accent-1));
        }

        .tile-card:nth-child(2)::before {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-3));
        }

        .tile-card:nth-child(3)::before {
            background: linear-gradient(90deg, var(--accent-3), var(--primary-2));
        }

        .tile-card:nth-child(4)::before {
            background: linear-gradient(90deg, var(--primary-2), var(--support-1));
        }

        .tile-card:nth-child(5)::before {
            background: linear-gradient(90deg, var(--support-1), var(--support-3));
        }

        .tile-card:nth-child(6)::before {
            background: linear-gradient(90deg, var(--support-3), var(--support-5));
        }

        .tile-card:nth-child(7)::before {
            background: linear-gradient(90deg, var(--support-5), var(--accent-2));
        }

        .tile-card:nth-child(8)::before {
            background: linear-gradient(90deg, var(--accent-2), var(--primary-1));
        }

        /* SVG 圖示容器 */
        .tile-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 10px;
        }

        /* 卡片標題 */
        .tile-card h3 {
            color: var(--accent-2);
            font-size: 33px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tile-card h3 .num-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            color: var(--bg);
            flex-shrink: 0;
        }

        .tile-card:nth-child(1) .num-badge {
            background: var(--primary-1);
        }

        .tile-card:nth-child(2) .num-badge {
            background: var(--accent-1);
        }

        .tile-card:nth-child(3) .num-badge {
            background: var(--primary-2);
        }

        .tile-card:nth-child(4) .num-badge {
            background: var(--support-1);
        }

        .tile-card:nth-child(5) .num-badge {
            background: var(--support-3);
        }

        .tile-card:nth-child(6) .num-badge {
            background: var(--support-5);
        }

        .tile-card:nth-child(7) .num-badge {
            background: var(--accent-2);
        }

        .tile-card:nth-child(8) .num-badge {
            background: var(--primary-1);
        }

        /* 卡片文字 */
        .tile-card p {
            font-size: 24px;
            line-height: 1.6;
            color: var(--text);
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="outer">
        <!-- 標題列 -->
        <div class="header-row">
            <div class="slide-title"><i class="fas fa-chart-line"></i> 金融科技八大趨勢</div>
            <div class="sub-info"><span>FinTech Trends</span> <i class="fas fa-landmark"></i></div>
        </div>
        <!-- 八宮格 -->
        <div class="eight-grid">
            <!-- 1. 生成式 AI -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="40" cy="40" r="28" fill="none" stroke="var(--primary-1)" stroke-width="2.5"
                        opacity="0.2" />
                    <path d="M28 52 L36 36 L44 46 L52 28" fill="none" stroke="var(--primary-1)" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="52" cy="28" r="4" fill="var(--accent-1)" />
                    <path d="M22 26 L26 22 L30 26" fill="none" stroke="var(--accent-1)" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <line x1="26" y1="22" x2="26" y2="16" stroke="var(--accent-1)" stroke-width="2"
                        stroke-linecap="round" />
                </svg>
                <h3><span class="num-badge">1</span>生成式 AI</h3>
                <p>智慧客服與風控建模<br>驅動個人化金融服務</p>
            </div>

            <!-- 2. 嵌入式金融 -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <rect x="16" y="22" width="48" height="36" rx="6" fill="none" stroke="var(--accent-1)"
                        stroke-width="2.5" />
                    <rect x="16" y="30" width="48" height="6" fill="var(--accent-1)" opacity="0.3" />
                    <circle cx="28" cy="48" r="5" fill="var(--accent-3)" opacity="0.4" />
                    <circle cx="42" cy="48" r="5" fill="var(--accent-3)" opacity="0.4" />
                    <path d="M50 44 L54 48 L50 52" fill="none" stroke="var(--accent-1)" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <h3><span class="num-badge">2</span>嵌入式金融</h3>
                <p>金融服務無縫嵌入<br>非金融場景生態圈</p>
            </div>

            <!-- 3. 開放銀行 -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="26" cy="40" r="12" fill="none" stroke="var(--primary-2)" stroke-width="2.5" />
                    <circle cx="54" cy="40" r="12" fill="none" stroke="var(--accent-3)" stroke-width="2.5" />
                    <path d="M36 34 Q40 40 36 46" fill="none" stroke="var(--primary-2)" stroke-width="2"
                        stroke-linecap="round" />
                    <path d="M44 34 Q40 40 44 46" fill="none" stroke="var(--accent-3)" stroke-width="2"
                        stroke-linecap="round" />
                    <line x1="32" y1="22" x2="48" y2="22" stroke="var(--primary-2)" stroke-width="2"
                        stroke-linecap="round" stroke-dasharray="3,3" />
                </svg>
                <h3><span class="num-badge">3</span>開放銀行</h3>
                <p>API 串聯跨業資料<br>打造共享金融生態</p>
            </div>

            <!-- 4. 數位支付 -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <rect x="20" y="18" width="28" height="44" rx="4" fill="none" stroke="var(--support-1)"
                        stroke-width="2.5" />
                    <line x1="20" y1="26" x2="48" y2="26" stroke="var(--support-1)" stroke-width="1.5" />
                    <line x1="20" y1="54" x2="48" y2="54" stroke="var(--support-1)" stroke-width="1.5" />
                    <circle cx="34" cy="58" r="2" fill="var(--support-1)" />
                    <path d="M52 30 Q62 30 62 40 Q62 50 52 50" fill="none" stroke="var(--support-3)" stroke-width="2"
                        stroke-linecap="round" />
                    <path d="M56 34 Q64 34 64 40 Q64 46 56 46" fill="none" stroke="var(--support-3)" stroke-width="1.5"
                        stroke-linecap="round" opacity="0.5" />
                    <circle cx="34" cy="40" r="6" fill="var(--support-1)" opacity="0.2" />
                    <text x="34" y="44" text-anchor="middle" fill="var(--support-1)" font-size="12"
                        font-weight="bold">$</text>
                </svg>
                <h3><span class="num-badge">4</span>數位支付</h3>
                <p>行動支付無現金化<br>即時跨境匯兌結算</p>
            </div>

            <!-- 5. 區塊鏈 -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <rect x="12" y="30" width="16" height="16" rx="3" fill="none" stroke="var(--support-3)"
                        stroke-width="2.5" />
                    <rect x="32" y="30" width="16" height="16" rx="3" fill="none" stroke="var(--support-3)"
                        stroke-width="2.5" />
                    <rect x="52" y="30" width="16" height="16" rx="3" fill="none" stroke="var(--support-3)"
                        stroke-width="2.5" />
                    <line x1="28" y1="38" x2="32" y2="38" stroke="var(--support-3)" stroke-width="2.5"
                        stroke-linecap="round" />
                    <line x1="48" y1="38" x2="52" y2="38" stroke="var(--support-3)" stroke-width="2.5"
                        stroke-linecap="round" />
                    <circle cx="20" cy="38" r="3" fill="var(--support-5)" opacity="0.6" />
                    <circle cx="40" cy="38" r="3" fill="var(--support-5)" opacity="0.6" />
                    <circle cx="60" cy="38" r="3" fill="var(--support-5)" opacity="0.6" />
                    <path d="M20 52 L40 58 L60 52" fill="none" stroke="var(--support-5)" stroke-width="1.5"
                        stroke-linecap="round" stroke-dasharray="3,3" />
                </svg>
                <h3><span class="num-badge">5</span>區塊鏈</h3>
                <p>去中心化信任機制<br>智能合約自動執行</p>
            </div>

            <!-- 6. 監理科技 -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <path d="M40 14 L62 26 L62 50 L40 62 L18 50 L18 26 Z" fill="none" stroke="var(--support-5)"
                        stroke-width="2.5" stroke-linejoin="round" />
                    <path d="M40 14 L62 26 L62 50 L40 62 L18 50 L18 26 Z" fill="var(--support-5)" opacity="0.08" />
                    <path d="M34 38 L38 44 L48 32" fill="none" stroke="var(--accent-2)" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="40" cy="38" r="16" fill="none" stroke="var(--support-5)" stroke-width="1.5"
                        stroke-dasharray="4,3" />
                </svg>
                <h3><span class="num-badge">6</span>監理科技</h3>
                <p>自動化合規檢測<br>即時風險監控預警</p>
            </div>

            <!-- 7. 永續金融 -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="40" cy="44" r="22" fill="none" stroke="var(--accent-2)" stroke-width="2.5" />
                    <circle cx="40" cy="44" r="22" fill="var(--accent-2)" opacity="0.06" />
                    <path d="M40 30 Q32 38 40 46 Q48 38 40 30" fill="var(--accent-2)" opacity="0.5" />
                    <line x1="40" y1="46" x2="40" y2="58" stroke="var(--accent-2)" stroke-width="2"
                        stroke-linecap="round" />
                    <path d="M34 52 L40 58 L46 52" fill="none" stroke="var(--accent-2)" stroke-width="1.5"
                        stroke-linecap="round" />
                    <path d="M28 24 A6 6 0 1 1 34 18" fill="none" stroke="var(--accent-2)" stroke-width="2"
                        stroke-linecap="round" />
                </svg>
                <h3><span class="num-badge">7</span>永續金融</h3>
                <p>ESG 數據整合分析<br>綠色投資決策支援</p>
            </div>

            <!-- 8. 資安韌性 -->
            <div class="tile-card">
                <svg class="tile-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <rect x="26" y="34" width="28" height="24" rx="4" fill="none" stroke="var(--primary-1)"
                        stroke-width="2.5" />
                    <path d="M32 34 L32 26 Q32 18 40 18 Q48 18 48 26 L48 34" fill="none" stroke="var(--primary-1)"
                        stroke-width="2.5" stroke-linecap="round" />
                    <circle cx="40" cy="44" r="4" fill="var(--primary-1)" />
                    <line x1="40" y1="48" x2="40" y2="52" stroke="var(--primary-1)" stroke-width="2.5"
                        stroke-linecap="round" />
                    <circle cx="20" cy="28" r="3" fill="var(--accent-1)" opacity="0.4" />
                    <circle cx="60" cy="28" r="3" fill="var(--accent-1)" opacity="0.4" />
                    <path d="M20 28 L26 32" stroke="var(--accent-1)" stroke-width="1.5" stroke-linecap="round"
                        opacity="0.4" />
                    <path d="M60 28 L54 32" stroke="var(--accent-1)" stroke-width="1.5" stroke-linecap="round"
                        opacity="0.4" />
                </svg>
                <h3><span class="num-badge">8</span>資安韌性</h3>
                <p>零信任架構防禦<br>營運持續不中斷</p>
            </div>
        </div>
    </div>
    <!-- 導覽列 -->
    <div class="controls">
        <button class="btn" onclick="prevSlide()">←</button>
        <span class="page-num" id="pageIndicator"></span>
        <button class="btn" onclick="nextSlide()">→</button>
    </div>
    <script src="https://abbeego.github.io/MyStyleSlide/slide-order.js"></script>
    <script src="https://abbeego.github.io/MyStyleSlide/control.js"></script>
</body>

</html>
