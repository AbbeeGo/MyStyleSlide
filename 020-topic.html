<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>核心理念</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://abbeego.github.io/MyStyleSlide/common.css">
    <style>
        body {
            background-image: var(--bg-topic);
        }

        .outer {
            position: absolute;
            top: 35%;
            left: 20%;
            display: grid;
            grid-template-columns: auto auto;
            column-gap: 22px;
            row-gap: 24px;
            align-items: center;
            justify-items: center;
        }

        h1 {
            font-size: 75px;
            line-height: 1.3;
            margin-left: 2em;
            color: var(--primary-1);
            font-weight: bold;
            grid-column: 1 / -1;
        }

        .subtitle {
            font-size: 38px;
            font-weight: 700;
            margin-top: 1em;
            margin-bottom: 40px;
            margin-left: 4em;
            grid-column: 1;
            color: var(--primary-2);
        }
    </style>
</head>

<body>
    <div class="outer">
        <h1>核心理念</h1>
        <div class="subtitle">為什麼我們需要 Agent Skills？</div>
    </div>

    <!-- 導覽列 -->
    <div class="controls">
        <button class="btn" onclick="prevSlide()">←</button>
        <span class="page-num" id="pageIndicator"></span>
        <button class="btn" onclick="nextSlide()">→</button>
    </div>
    <script src="https://abbeego.github.io/MyStyleSlide/slide-order.js"></script>
    <script src="https://abbeego.github.io/MyStyleSlide/control.js"></script>
</body>

</html>
