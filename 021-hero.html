<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>核心理念</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://abbeego.github.io/MyStyleSlide/common.css">
    <style>
        body {
            background-image: var(--bg-other);
        }

        .outer {
            position: absolute;
            top: 15%;
            bottom: 15%;
            left: 15%;
            right: 15%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 60px;
        }

        .text-content {
            display: flex;
            flex-direction: column;
            gap: 25px;
            flex: 1;
        }

        h1 {
            font-size: 110px;
            line-height: 1.2;
            color: var(--primary-1);
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            font-size: 50px;
            font-weight: 700;
            color: var(--primary-2);
            padding-left: 15px;
            border-left: 8px solid var(--accent-1);
        }

        .description {
            font-size: 32px;
            color: var(--text);
            max-width: 600px;
            line-height: 1.6;
            margin-top: 30px;
        }

        .graphic-container {
            position: relative;
            width: 550px;
            height: 550px;
            flex-shrink: 0;
        }

        /* 旋轉動畫 */
        @keyframes rotate-slow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes rotate-fast-reverse {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(-360deg);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .ring-1 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 520px;
            height: 520px;
            margin-top: -260px;
            margin-left: -260px;
            animation: rotate-slow 20s linear infinite;
        }

        .ring-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 380px;
            height: 380px;
            margin-top: -190px;
            margin-left: -190px;
            animation: rotate-fast-reverse 15s linear infinite;
        }

        .center-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 110px;
            color: var(--primary-1);
            animation: float 4s ease-in-out infinite;
            background: white;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 40px rgba(0, 143, 199, 0.25);
            border: 6px solid var(--accent-1);
        }

        /* 輔助裝飾圓點 */
        .dot {
            position: absolute;
            border-radius: 50%;
        }

        .dot-1 {
            width: 35px;
            height: 35px;
            background: var(--support-1);
            top: 8%;
            right: 8%;
            animation: float 3s ease-in-out infinite 0.5s;
        }

        .dot-2 {
            width: 25px;
            height: 25px;
            background: var(--support-3);
            bottom: 10%;
            left: 10%;
            animation: float 3s ease-in-out infinite 1s;
        }

        .dot-3 {
            width: 45px;
            height: 45px;
            background: var(--accent-3);
            bottom: 20%;
            right: 0%;
            animation: float 4s ease-in-out infinite 1.5s;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="outer">
        <!-- 文字區塊 -->
        <div class="text-content">
            <h1>核心優勢</h1>
            <div class="subtitle">釋放 Agent Skills 潛能</div>
            <div class="description">
                透過強大的架構設計與智能運算引擎，為企業打造具備「自動化、分析、穩定、進化」四大特性的新世代服務生態系。
            </div>
        </div>

        <!-- 動態 SVG 與圖示裝飾區塊, 此svg為範例,可由AI視情境修改 -->
        <div class="graphic-container">
            <!-- 外圈 SVG (使用 primary-2 漸層) -->
            <svg class="ring-1" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--primary-2)" stop-opacity="0.8" />
                        <stop offset="100%" stop-color="var(--accent-1)" stop-opacity="0.1" />
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="48" fill="none" stroke="url(#grad1)" stroke-width="1.5"
                    stroke-dasharray="10 5" />
                <circle cx="50" cy="50" r="45" fill="none" stroke="var(--primary-2)" stroke-width="0.8" opacity="0.5" />
                <!-- 軌道上的小圓點 -->
                <circle cx="50" cy="2" r="3" fill="var(--primary-2)" />
                <circle cx="98" cy="50" r="2" fill="var(--accent-1)" />
                <circle cx="50" cy="98" r="4" fill="var(--support-1)" />
            </svg>

            <!-- 內圈 SVG (使用 primary-1 與多邊形設計) -->
            <svg class="ring-2" viewBox="0 0 100 100">
                <polygon points="50,2 98,50 50,98 2,50" fill="none" stroke="var(--primary-1)" stroke-width="1.5"
                    opacity="0.4" />
                <circle cx="50" cy="50" r="40" fill="none" stroke="var(--accent-2)" stroke-width="2.5"
                    stroke-dasharray="15 15" opacity="0.6" />
            </svg>

            <!-- 裝飾圓點 -->
            <div class="dot dot-1"></div>
            <div class="dot dot-2"></div>
            <div class="dot dot-3"></div>

            <!-- 中心浮動 Icon -->
            <div class="center-icon">
                <i class="fa-solid fa-microchip"></i>
            </div>
        </div>
    </div>

    <!-- 導覽列 -->
    <div class="controls">
        <button class="btn" onclick="prevSlide()">←</button>
        <span class="page-num" id="pageIndicator"></span>
        <button class="btn" onclick="nextSlide()">→</button>
    </div>
    <script src="https://abbeego.github.io/MyStyleSlide/slide-order.js"></script>
    <script src="https://abbeego.github.io/MyStyleSlide/control.js"></script>
</body>

</html>
